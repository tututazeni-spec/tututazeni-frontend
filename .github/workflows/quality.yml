name: Frontend Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm ci

      # Lint não bloqueante: o projeto tem muitos avisos pré-existentes
      # (incluindo código gerado em prisma/generated). Serve só de relatório.
      - name: Lint (não bloqueante)
        run: npm run lint
        continue-on-error: true

      # Passo bloqueante: garante que o Next.js compila e passa o type-check.
      - name: Build
        run: npm run build
